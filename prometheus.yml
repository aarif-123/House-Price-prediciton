global:
  scrape_interval: 10s # How frequently to scrape targets
  evaluation_interval: 10s # How frequently to evaluate rules

scrape_configs:
  - job_name: 'house_price_api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
        labels:
          environment: 'production'
          service: 'fastapi'
